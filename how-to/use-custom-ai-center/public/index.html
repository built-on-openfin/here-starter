<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Custom AI Center Demo</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="./styles.css" />
		<script src="./js/app.bundle.js" defer></script>
	</head>
	<body>
		<main class="panel">
			<header class="panel-header">
				<h1>Custom AI Center Demo</h1>
				<p class="subtitle">Demonstrates supertab context retrieval, signal flow, and page-based cache.</p>
			</header>

			<section id="status" class="status"></section>

			<section class="meta" aria-live="polite">
				<span id="ai-views-status" class="meta-line"></span>
				<div id="page-id-row" class="page-id-row hidden" hidden>
					<span>Page id:</span>
					<code id="active-page-id"></code>
				</div>
			</section>

			<section class="transcript-toolbar">
				<button type="button" id="get-ai-context" class="btn btn-primary">Get AI Context</button>
				<button type="button" id="clear-transcript" class="btn" disabled>Clear</button>
			</section>

			<section class="console-wrap">
				<h2>Transcript</h2>
				<pre id="transcript" class="console"></pre>
			</section>
		</main>
	</body>
</html>
